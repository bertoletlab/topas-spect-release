site_name: OpenTOPAS-SPECT
site_description: SPECT imaging simulation for OpenTOPAS — collimators, detectors, patient phantoms, dynamic acquisitions, and variance reduction
site_author: Bertolet Lab
repo_url: https://github.com/bertoletlab/topas-spect-release
repo_name: bertoletlab/topas-spect-release
edit_uri: edit/main/docs/
docs_dir: docs
site_url: https://topas-spect-release.readthedocs.io/

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.png
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: installation.md
    - Quickstart: quickstart.md
    - How a deck is put together: concepts.md
  - User Guide:
    - Camera and collimator systems: systems.md
    - Designing detectors and collimators: design.md
    - Patient-like phantoms: phantoms.md
    - QA phantoms: qa_phantoms.md
    - Dynamic acquisitions: dynamic_acquisition.md
    - CT-driven detector motion: ring_motion.md
    - Variance reduction: variance_reduction.md
    - Python tools: tools.md
  - Validation: validation.md
  - Building details: building.md
